<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Conectividade nas Escolas - Ceará | João Gabriel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reset.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/black.min.css">

    <style>
        .reveal .slides section { padding: 0; }
        .reveal .slides img { max-width: 100%; max-height: 100%; margin: 0; object-fit: contain; }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            
            <section data-background-image="slides/Slide1.PNG" data-background-size="contain"></section>
            <section data-background-image="slides/Slide2.PNG" data-background-size="contain"></section>
            <section data-background-image="slides/Slide3.PNG" data-background-size="contain"></section>
            
            <section>
                <h2 style="color: #4db8ff;">Conectividade Escolar</h2>
                <p>Análise de dados do Estado do Ceará</p>
            </section>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            center: true,
            transition: 'convex', // Animação 3D elegante
            backgroundTransition: 'fade',
            // Atalhos: 'F' para tela cheia, 'O' para visão geral
        });
    </script>
</body>
</html>
