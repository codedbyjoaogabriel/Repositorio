<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Slides | João Gabriel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 20px; text-align: center; }
        .slide-wrapper { width: 90%; max-width: 1100px; aspect-ratio: 16 / 9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .instructions { margin-top: 20px; color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

    <header>
        <h1>Minha Apresentação</h1>
    </header>

    <div class="slide-wrapper">
        <iframe 
            src="https://view.officeapps.live.com/op/embed.aspx?src=https://codedbyjoaogabriel.github.io/repository/Conectividade nas Escolas do Estado do Ceará.pptx" 
            allowfullscreen="true" 
            mozallowfullscreen="true" 
            webkitallowfullscreen="true">
        </iframe>
    </div>

    <p class="instructions">
        Para <strong>Tela Cheia</strong>: Clique no ícone de monitor/setas no canto inferior direito do slide.
    </p>

</body>
</html>
