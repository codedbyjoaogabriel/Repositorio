<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides | João Gabriel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0b0e14 70%);
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
        }

        header { padding: 4rem 2rem; text-align: center; }
        header h1 { font-size: 2.2rem; font-weight: 600; letter-spacing: -1px; margin: 0; }
        header p { color: #64748b; margin-top: 8px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem 5rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Card sem imagem, focado no título */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .card h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
            color: #f1f5f9;
            text-transform: capitalize;
        }

        .card-footer {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Visualizador */
        #viewer-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 1000;
            padding: 1.5rem;
        }

        #pdf-iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 2rem;
            background: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <header>
        <h1>Repositório de Slides</h1>
        <p>João Gabriel • Ceará</p>
    </header>

    <div class="container">
        <div id="file-grid" class="grid">Carregando...</div>
    </div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">FECHAR</button>
        <iframe id="pdf-iframe"></iframe>
    </div>

    <script>
        const USER = 'codedbyjoaogabriel';
        const REPO = 'repository';
        const FOLDER = 'slides';

        async function loadFiles() {
            const grid = document.getElementById('file-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                const files = await response.json();
                
                grid.innerHTML = '';
                // Filtra PDF ou PPTX
                const validFiles = files.filter(f => f.name.endsWith('.pdf') || f.name.endsWith('.pptx'));

                validFiles.forEach(file => {
                    const isPdf = file.name.endsWith('.pdf');
                    const cleanName = file.name.replace('.pdf', '').replace('.pptx', '').replace(/-/g, ' ');
                    const fileUrl = `https://${USER}.github.io/${REPO}/${FOLDER}/${encodeURIComponent(file.name)}`;
                    
                    // Se for PPTX, usa o visualizador da Microsoft, se for PDF abre direto (melhor qualidade)
                    const finalUrl = isPdf ? fileUrl : `https://view.officeapps.live.com/op/embed.aspx?src=${fileUrl}`;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div>
                            <div class="card-icon">${isPdf ? '📄' : '📊'}</div>
                            <h3>${cleanName}</h3>
                        </div>
                        <div class="card-footer">${isPdf ? 'Visualizar PDF' : 'Abrir PowerPoint'}</div>
                    `;
                    
                    card.onclick = () => {
                        document.getElementById('pdf-iframe').src = finalUrl;
                        document.getElementById('viewer-modal').style.display = 'block';
                        document.body.style.overflow = 'hidden';
                    };
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p>Erro: Certifique-se de que a pasta "/slides" existe.</p>';
            }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('pdf-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeViewer(); });
        loadFiles();
    </script>
</body>
</html>
