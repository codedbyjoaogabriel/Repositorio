<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório Dinâmico | João Gabriel</title>
    <style>
        :root { --primary: #61afef; --bg: #282c34; --card: #353b45; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--primary); word-break: break-all; }
        
        /* Modal para o Slide */
        #viewer-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; z-index: 1001; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Meus Slides</h1>
    <p>Os arquivos abaixo são carregados automaticamente da pasta <code>/slides</code></p>
    <div id="file-grid" class="grid">Carregando apresentações...</div>
</div>

<div id="viewer-modal">
    <button class="close-btn" onclick="closeViewer()">FECHAR [X]</button>
    <iframe id="slide-iframe" allowfullscreen="true"></iframe>
</div>

<script>
    const USER = 'codedbyjoaogabriel';
    const REPO = 'repository';
    const FOLDER = 'slides';

    // 1. Busca os arquivos na API do GitHub
    async function loadFiles() {
        const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`;
        
        try {
            const response = await fetch(url);
            const files = await response.json();
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '';

            files.forEach(file => {
                if (file.name.endsWith('.pptx') || file.name.endsWith('.pdf')) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<h3>${file.name.replace(/%20/g, ' ')}</h3><small>Clique para visualizar</small>`;
                    card.onclick = () => openViewer(file.name);
                    grid.appendChild(card);
                }
            });
        } catch (e) {
            document.getElementById('file-grid').innerHTML = 'Erro ao carregar arquivos. Verifique se a pasta /slides existe.';
        }
    }

    function openViewer(fileName) {
        const modal = document.getElementById('viewer-modal');
        const iframe = document.getElementById('slide-iframe');
        // URL de visualização dinâmica
        const fileUrl = `https://${USER}.github.io/${REPO}/${FOLDER}/${encodeURIComponent(fileName)}`;
        iframe.src = `https://view.officeapps.live.com/op/embed.aspx?src=${fileUrl}`;
        modal.style.display = 'block';
    }

    function closeViewer() {
        document.getElementById('viewer-modal').style.display = 'none';
        document.getElementById('slide-iframe').src = '';
    }

    loadFiles();
</script>

</body>
</html>
